<div class="mx-6">
  <div class="flex max-md:flex-col max-md:mt-2 max-md:items-center mb-4 justify-center items-center gap-2">
    <input type="search" placeholder="Rolle suchen..." class="input-field max-md:w-full max-md:max-w-md" (input)="onSearch($any($event.target).value)">
  </div>
  <div class="card-grid">
    <div class="card" *ngFor="let r of filteredRoles">
      <div class="card-header">
        <p class="card-name">{{ r.roleName }}</p>
      </div>
      <p class="card-description">{{r.description}}</p>
    </div>
  </div>
  <div *ngIf="filteredRoles.length === 0" class="mt-4 text-sm text-center text-gray-500">Keine Rollen gefunden.</div>
</div>
